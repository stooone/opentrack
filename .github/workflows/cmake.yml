name: CMake

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
        - os: macos-latest
          cmake: cmake
          onnx_dir: /usr/local
        - os: ubuntu-latest
          cmake: cmake
          onnx_dir: /usr
        - os: windows-latest
          cmake: .\.github\workflows\build-windows.bat cmake
          onnx_dir: onnxruntime-win

    steps:
    - name: clone opentrack/opentrack
      uses: actions/checkout@v2
      with:
        submodules: true

    - name: clone opentrack/depends
      uses: actions/checkout@v2
      with:
        repository: opentrack/opentrack-depends
        submodules: true
        path: opentrack-depends

    - uses: seanmiddleditch/gha-setup-ninja@master

    - name: Install Linux Dependencies
      run: |
        sudo apt update
        sudo apt install libproc2-dev libopencv-dev libopencv-dev wine64-tools
        sudo apt install qt6-tools-dev qt6-serialport-dev qt6-base-private-dev
        sudo apt install libusb-1.0-0-dev libsdl2-dev

        mkdir /tmp/a
        wget -qO- https://github.com/microsoft/onnxruntime/releases/download/v1.23.2/onnxruntime-linux-x64-1.23.2.tgz  | tar --strip-components=1 -zxf - -C/tmp/a
        sudo cp -R /tmp/a/{lib,include} /usr
      if: matrix.os == 'ubuntu-latest'

    - name: Install opencv (Windows)
      uses: cvpkg/opencv-action@main
      with:
        opencv_tag: '4.x'
        BUILD_LIST: 'core,imgcodecs,imgproc,video,videoio,calib3d,highgui'
        BUILD_SHARED_LIBS: 'OFF'
        BUILD_WITH_STATIC_CRT: 'OFF'
      if: matrix.os == 'windows-latest'

    - name: Install opencv (macOS)
      run: brew install opencv
      if: matrix.os == 'macos-latest'

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        dir: "${{ github.workspace }}/qt"
        version: '6.8.3'
        modules: qtserialport qtmultimedia qtimageformats
        target: 'desktop'
        use-official: true
      if: matrix.os != 'ubuntu-latest'

    - name: Install ONNXRuntime (Windows)
      shell: bash
      run: |
        curl -sL https://github.com/microsoft/onnxruntime/releases/download/v1.23.2/onnxruntime-win-x64-1.23.2.zip -o onnx.zip
        unzip -q onnx.zip -d onnx-extracted
        mv onnx-extracted/onnxruntime-win-x64-1.23.2 ${{github.workspace}}/${{matrix.onnx_dir}}
      if: matrix.os == 'windows-latest'

    - name: Configure (Unix)
      run: ${{matrix.cmake}} -GNinja -S ${{github.workspace}}/ -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DQt6_DIR="${{env.QT_ROOT_DIR}}/lib/cmake/Qt6" -DONNXRuntime_DIR="${{matrix.onnx_dir}}"
      if: matrix.os != 'windows-latest'

    - name: Configure (Windows)
      run: ${{matrix.cmake}} -GNinja -S ${{github.workspace}}/ -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DQt6_DIR="${{env.QT_ROOT_DIR}}/lib/cmake/Qt6" -DONNXRuntime_DIR="${{github.workspace}}/${{matrix.onnx_dir}}"
      if: matrix.os == 'windows-latest'

    - name: Build
      run: ${{matrix.cmake}} --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target install

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: opentrack-${{matrix.os}}
        path: ${{github.workspace}}/build/install/
